<!DOCTYPE html>
<html>
<head>
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h2>Jay-Ar Anos</h2>
  <nav>
    <a href="index.html">•Home</a>
    <a href="photo.html">•Photo</a>
    <a href="about.html">•About Me</a>
    <a href="contact.html">•Contact</a>
  </nav>
</header>

<section class="gallery">
  <h1>Photos</h1>

  <div class="slider">
    <button class="prev" onclick="prevSlide()">❮</button>

    <div class="slides">
	
      <img src="/portfolio/1.jpg" class="slide">
      <img src="/portfolio/2.jpeg" class="slide">
      <img src="/portfolio/3.png" class="slide">
      <img src="/portfolio/4.png" class="slide">
      <img src="/portfolio/5.jpeg" class="slide">
      <img src="/portfolio/6.jpeg" class="slide">
      <img src="/portfolio/7.jpeg" class="slide">
      <img src="/portfolio/8.jpeg" class="slide">
      <img src="/portfolio/9.jpeg" class="slide">
      <img src="/portfolio/10.jpg" class="slide">
      <img src="/portfolio/11.jpeg" class="slide">
      <img src="/portfolio/12.jpeg" class="slide">
      <img src="/portfolio/13.jpg" class="slide">
	  
    </div>

    <button class="next" onclick="nextSlide()">❯</button>
  </div>
</section>

<script>
let slideIndex = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index){
  slides.forEach((slide,i)=>{
    slide.classList.remove("active");
    if(i === index) slide.classList.add("active");
  });
}

function nextSlide(){
  slideIndex = (slideIndex + 1) % slides.length;
  showSlide(slideIndex);
}

function prevSlide(){
  slideIndex = (slideIndex - 1 + slides.length) % slides.length;
  showSlide(slideIndex);
}

</script>

</body>
</html>
